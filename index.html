<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contador de Eventos PokeMMO</title>
    <style>
        /* --- Estilos Visuales (CSS) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Transparente para OBS */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card-container {
            display: flex;
            gap: 30px; /* Espacio entre tarjetas */
        }

        .card {
            width: 300px;
            height: 500px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            box-sizing: border-box;
            /* Efecto de brillo en el borde (neon glow) */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        /* Tarjeta Verde */
        .card-verde {
            background: radial-gradient(circle at center, #0a1410 0%, #030806 100%);
            border: 3px solid #00c853;
            box-shadow: 0 0 15px rgba(0, 200, 83, 0.3);
        }
        .card-verde .team-name { color: #00c853; }
        .card-verde .score { color: #00c853; text-shadow: 0 0 10px #00c853; }

        /* Tarjeta Azul */
        .card-azul {
            background: radial-gradient(circle at center, #0a1114 0%, #030608 100%);
            border: 3px solid #2979ff;
            box-shadow: 0 0 15px rgba(41, 121, 255, 0.3);
        }
        .card-azul .team-name { color: #2979ff; }
        .card-azul .score { color: #2979ff; text-shadow: 0 0 10px #2979ff; }

        /* Tarjeta Roja */
        .card-roja {
            background: radial-gradient(circle at center, #140a0a 0%, #080303 100%);
            border: 3px solid #ff1744;
            box-shadow: 0 0 15px rgba(255, 23, 68, 0.3);
        }
        .card-roja .team-name { color: #ff1744; }
        .card-roja .score { color: #ff1744; text-shadow: 0 0 10px #ff1744; }

        .sprite-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .sprite-container img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .team-name {
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .score-container {
            width: 80%;
            border-top: 2px solid rgba(255,255,255,0.3);
            padding-top: 10px;
            margin-bottom: 20px;
        }

        .score {
            font-size: 72px;
            font-weight: bold;
            text-align: center;
            line-height: 1;
        }

    </style>
</head>
<body>

    <div class="card-container">
        <!-- TARJETA VERDE -->
        <div class="card card-verde">
            <div class="sprite-container">
                
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/3.png" alt="Venusaur">
            </div>
            <div class="team-name">EQUIPO VERDE</div>
            <div class="score-container">
                <div id="score-verde" class="score">0</div>
            </div>
        </div>

        <!-- TARJETA AZUL -->
        <div class="card card-azul">
            <div class="sprite-container">
               
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/9.png" alt="Blastoise">
            </div>
            <div class="team-name">EQUIPO AZUL</div>
            <div class="score-container">
                <div id="score-azul" class="score">0</div>
            </div>
        </div>

        <!-- TARJETA ROJA -->
        <div class="card card-roja">
            <div class="sprite-container">
                
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" alt="Charizard">
            </div>
            <div class="team-name">EQUIPO ROJO</div>
            <div class="score-container">
                <div id="score-roja" class="score">0</div>
            </div>
        </div>
    </div>

   <script>
    // IMPORTANTE: Cambia TU_CANAL por tu nombre de usuario de Twitch
    const canal = "TU_CANAL"; 

    async function actualizarContador() {
        try {
            // Consultamos los tres contadores a la API
            const colores = ['verde', 'azul', 'rojo'];
            
            for (let color of colores) {
                const response = await fetch(`https://api.rdimitrov.com/twitch/counter/get?channel=${canal}&name=${color}`);
                const data = await response.json();
                
                // Actualizamos el número en el HTML usando el ID correspondiente
                document.getElementById('score-' + color).innerText = data.value || 0;
            }
        } catch (error) {
            console.error("Error al actualizar:", error);
        }
    }

    // Se actualiza automáticamente cada 3 segundos
    setInterval(actualizarContador, 3000);
    actualizarContador();
</script>

</body>
</html>
