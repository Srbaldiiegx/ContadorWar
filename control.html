<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel de control - Marcador PokeMMO</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0d0f12;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      color: #eee;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .worker-config {
      max-width: 480px;
      margin: 0 auto 28px auto;
      background: #16191d;
      border: 1px solid #262a30;
      border-radius: 12px;
      padding: 16px;
    }

    .worker-config label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
    }

    .worker-config input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0d1117;
      color: #eee;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .worker-config button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #3d7eff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Mismo estilo visual que index.html */
    .card {
      width: 260px;
      border-radius: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      box-sizing: border-box;
    }

    .card-verde {
      background: radial-gradient(circle, #0a1410, #030806);
      border: 3px solid #00c853;
      box-shadow: 0 0 15px #00c8534d;
    }

    .card-azul {
      background: radial-gradient(circle, #0a1114, #030608);
      border: 3px solid #2979ff;
      box-shadow: 0 0 15px #2979ff4d;
    }

    .card-roja {
      background: radial-gradient(circle, #140a0a, #080303);
      border: 3px solid #ff1744;
      box-shadow: 0 0 15px #ff17444d;
    }

    .card-verde .team-name,
    .card-verde .score {
      color: #00c853;
    }

    .card-azul .team-name,
    .card-azul .score {
      color: #2979ff;
    }

    .card-roja .team-name,
    .card-roja .score {
      color: #ff1744;
    }

    .sprite-container {
      display: grid;
      place-items: center;
      height: 110px;
    }

    .sprite-container img {
      max-width: 90px;
      max-height: 90px;
      object-fit: contain;
    }

    .team-name {
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 8px;
      margin-bottom: 6px;
      text-shadow: 1px 1px 3px #0008;
    }

    .score-container {
      width: 80%;
      border-top: 2px solid #ffffff4d;
      padding-top: 10px;
      margin-bottom: 16px;
    }

    .score {
      font-size: 56px;
      font-weight: bold;
      text-align: center;
      line-height: 1;
      text-shadow: 0 0 10px currentColor;
    }

    /* Controles propios del panel */
    .buttons-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      width: 84%;
      margin-bottom: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      color: white;
    }

    .btn-sumar {
      background: #1b7a3b;
    }

    .btn-restar {
      background: #7a1b1b;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .manual-row {
      display: flex;
      gap: 8px;
      width: 84%;
      margin-top: 4px;
    }

    .manual-row input[type="number"] {
      flex: 1;
      min-width: 0;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0d1117;
      color: #eee;
      font-size: 15px;
      text-align: center;
    }

    .manual-row button {
      flex: 1;
      padding: 8px 0;
      border-radius: 8px;
      border: none;
      background: #444a54;
      color: white;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }

    .status-msg {
      max-width: 480px;
      margin: 20px auto 0 auto;
      text-align: center;
      font-size: 13px;
      color: #999;
      min-height: 18px;
    }
  </style>
</head>

<body>
  <h1>Panel de control del marcador</h1>
  <div class="subtitle">Suma o resta puntos sin usar el chat</div>

  <div class="worker-config">
    <label for="workerUrl">URL del Worker</label>
    <input type="text" id="workerUrl" placeholder="https://icy-bar-4f8e.diegoasti13.workers.dev">
    <label for="secret">Contraseña (secret)</label>
    <input type="password" id="secret" placeholder="Tu NIGHTBOT_SECRET">
    <button id="saveConfig">Guardar configuracion</button>
  </div>

  <div class="cards">
    <div class="card card-verde">
      <div class="sprite-container"><img
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/3.png" alt="Venusaur"></div>
      <div class="team-name">Equipo verde</div>
      <div class="score-container">
        <div class="score" id="score-verde">0</div>
      </div>
      <div class="buttons-row">
        <button class="btn btn-restar" data-team="verde" data-delta="-1">-1</button>
        <button class="btn btn-sumar" data-team="verde" data-delta="1">+1</button>
      </div>
      <div class="buttons-row">
        <button class="btn btn-restar" data-team="verde" data-delta="-5">-5</button>
        <button class="btn btn-sumar" data-team="verde" data-delta="5">+5</button>
      </div>
      <div class="manual-row">
        <input type="number" id="manual-verde" placeholder="cantidad">
        <button data-team="verde" class="manual-restar">Restar</button>
        <button data-team="verde" class="manual-sumar">Sumar</button>
      </div>
    </div>

    <div class="card card-azul">
      <div class="sprite-container"><img
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/9.png" alt="Blastoise"></div>
      <div class="team-name">Equipo azul</div>
      <div class="score-container">
        <div class="score" id="score-azul">0</div>
      </div>
      <div class="buttons-row">
        <button class="btn btn-restar" data-team="azul" data-delta="-1">-1</button>
        <button class="btn btn-sumar" data-team="azul" data-delta="1">+1</button>
      </div>
      <div class="buttons-row">
        <button class="btn btn-restar" data-team="azul" data-delta="-5">-5</button>
        <button class="btn btn-sumar" data-team="azul" data-delta="5">+5</button>
      </div>
      <div class="manual-row">
        <input type="number" id="manual-azul" placeholder="cantidad">
        <button data-team="azul" class="manual-restar">Restar</button>
        <button data-team="azul" class="manual-sumar">Sumar</button>
      </div>
    </div>

    <div class="card card-roja">
      <div class="sprite-container"><img
          src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" alt="Charizard"></div>
      <div class="team-name">Equipo rojo</div>
      <div class="score-container">
        <div class="score" id="score-rojo">0</div>
      </div>
      <div class="buttons-row">
        <button class="btn btn-restar" data-team="rojo" data-delta="-1">-1</button>
        <button class="btn btn-sumar" data-team="rojo" data-delta="1">+1</button>
      </div>
      <div class="buttons-row">
        <button class="btn btn-restar" data-team="rojo" data-delta="-5">-5</button>
        <button class="btn btn-sumar" data-team="rojo" data-delta="5">+5</button>
      </div>
      <div class="manual-row">
        <input type="number" id="manual-rojo" placeholder="cantidad">
        <button data-team="rojo" class="manual-restar">Restar</button>
        <button data-team="rojo" class="manual-sumar">Sumar</button>
      </div>
    </div>
  </div>

  <div class="status-msg" id="statusMsg"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDlC6cK0o7L99ZVNU1WpdeGVV6ym4rwpiw",
      authDomain: "contador2k26.firebaseapp.com",
      databaseURL: "https://contador2k26-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "contador2k26",
      storageBucket: "contador2k26.firebasestorage.app",
      messagingSenderId: "211348542156",
      appId: "1:211348542156:web:5518497309e5c2ec0aa869"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const scoresRef = ref(db, 'puntos');

    onValue(scoresRef, (snapshot) => {
      const data = snapshot.val() || {};
      document.querySelector('#score-rojo').textContent = data.rojo ?? 0;
      document.querySelector('#score-verde').textContent = data.verde ?? 0;
      document.querySelector('#score-azul').textContent = data.azul ?? 0;
    });

    const workerUrlInput = document.querySelector('#workerUrl');
    const secretInput = document.querySelector('#secret');
    const statusMsg = document.querySelector('#statusMsg');

    workerUrlInput.value = localStorage.getItem('workerUrl') || '';
    secretInput.value = localStorage.getItem('secret') || '';

    document.querySelector('#saveConfig').addEventListener('click', () => {
      localStorage.setItem('workerUrl', workerUrlInput.value.trim());
      localStorage.setItem('secret', secretInput.value.trim());
      statusMsg.textContent = 'Configuracion guardada en este dispositivo.';
      setTimeout(() => { statusMsg.textContent = ''; }, 2000);
    });

    async function enviarPuntos(team, delta) {
      const workerUrl = workerUrlInput.value.trim().replace(/\/$/, '');
      const secret = secretInput.value.trim();

      if (!workerUrl || !secret) {
        statusMsg.textContent = 'Primero guarda la URL del Worker y la contrasena.';
        return;
      }
      if (isNaN(delta) || delta === 0) {
        statusMsg.textContent = 'Introduce una cantidad valida distinta de 0.';
        return;
      }

      const allButtons = document.querySelectorAll('button');
      allButtons.forEach((b) => b.disabled = true);
      statusMsg.textContent = 'Actualizando...';

      try {
        const res = await fetch(`${workerUrl}/score?team=${team}&delta=${delta}&secret=${encodeURIComponent(secret)}`);
        const text = await res.text();
        statusMsg.textContent = res.ok ? text : `Error: ${text}`;
      } catch (err) {
        statusMsg.textContent = 'Error de conexion con el Worker.';
      } finally {
        allButtons.forEach((b) => b.disabled = false);
      }
    }

    // Botones rapidos (+1 / -1 / +5 / -5)
    document.querySelectorAll('.btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        enviarPuntos(btn.dataset.team, parseInt(btn.dataset.delta, 10));
      });
    });

    // Botones de cantidad manual
    document.querySelectorAll('.manual-sumar').forEach((btn) => {
      btn.addEventListener('click', () => {
        const team = btn.dataset.team;
        const input = document.querySelector(`#manual-${team}`);
        const cantidad = parseInt(input.value, 10);
        enviarPuntos(team, Math.abs(cantidad));
      });
    });

    document.querySelectorAll('.manual-restar').forEach((btn) => {
      btn.addEventListener('click', () => {
        const team = btn.dataset.team;
        const input = document.querySelector(`#manual-${team}`);
        const cantidad = parseInt(input.value, 10);
        enviarPuntos(team, -Math.abs(cantidad));
      });
    });
  </script>
</body>

</html>
